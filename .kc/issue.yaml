issue_packet:
  issue_ref: github:sawadari/KC/issues/2
  problem_statement: "`.kc/ruleset.yaml` is loaded but does not yet control which KC-AE rules run or how severities are interpreted."
  expected_outcome: "KC treats the ruleset as executable deterministic policy for rule enablement and severity overrides."
  acceptance_criteria:
    - "`ruleset.rules` limits evaluation to the listed KC-AE rules."
    - "`ruleset.severity_overrides` can override finding severity by rule ID."
    - "Unknown rule IDs in ruleset configuration produce deterministic findings."
    - "Tests cover disabled rule behavior, severity override behavior, and invalid rule IDs."
    - "KC self-check still passes."
  validation_scenario:
    statement: "A fixture disables or downgrades a normally blocking rule and KC produces the expected non-blocking decision without changing rule code."
  risk_tier: medium
  non_goals:
    - "Remote policy fetching."
    - "Organization-wide ruleset inheritance."
    - "Changing the default KC-AE rule meanings."
  issue_state: ready_for_plan

