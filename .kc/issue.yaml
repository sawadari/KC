issue_packet:
  issue_ref: https://github.com/sawadari/KC/issues/65
  related_issue_refs:
    - https://github.com/sawadari/KC/issues/66
    - https://github.com/sawadari/KC/issues/67
    - https://github.com/sawadari/KC/issues/68
    - https://github.com/sawadari/KC/issues/69
  problem_statement: NRVV is now present across KC artifacts, but follow-up
    issues identified gaps in Need trace consistency, profile-based
    enforcement, structured CLI intake, parser-friendly examples, and explicit
    Requirement-to-plan/evidence traceability.
  expected_outcome: KC can keep NRVV trace status consistent, load structured
    NRVV from a file, configure NRVV enforcement profiles, document
    parser-friendly examples, and trace Requirements through plan items and
    verification evidence.
  nrvv:
    need:
      need_id: NEED-1
      stakeholder: KC maintainers and reviewers
      situation: Reviewers rely on KC Evidence Bundles and Issue artifacts to
        understand whether AI-assisted PRs satisfy the original Need.
      pain_or_risk: Inconsistent trace status, weak profile controls, and
        missing explicit Requirement links make NRVV evidence harder to trust
        and use.
      desired_operational_outcome: Reviewers can follow Need, Requirement,
        Verification, and Validation through KC artifacts with predictable
        enforcement strength.
    requirements:
      - requirement_id: REQ-1
        statement: Align Need trace status and evidence_refs with passed
          validation evidence.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-2
        statement: Add parse-friendly NRVV examples to Issue template and README files.
        source_need_ref: NEED-1
        risk_tier: low
      - requirement_id: REQ-3
        statement: Add NRVV enforcement profiles while preserving default
          compatibility.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-4
        statement: Add issue-record --nrvv-file for structured NRVV YAML input.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-5
        statement: Trace Requirements through plan_items[].requirement_refs and
          verification_evidence[].requirement_refs.
        source_need_ref: NEED-1
        risk_tier: medium
    verification:
      - requirement_ref: REQ-1
        method: unit_test
        success_criteria: Need status becomes addressed when validation passed
          evidence is present.
        evidence_expected: npm test
      - requirement_ref: REQ-2
        method: diff_inspection
        success_criteria: Issue template and README files contain parse-friendly
          NRVV examples.
        evidence_expected: review diff
      - requirement_ref: REQ-3
        method: unit_test
        success_criteria: optional, warning, and strict NRVV profiles behave
          deterministically.
        evidence_expected: npm test
      - requirement_ref: REQ-4
        method: cli_integration_test
        success_criteria: issue-record accepts valid nrvv-file and rejects
          non-object YAML.
        evidence_expected: npm test
      - requirement_ref: REQ-5
        method: unit_test
        success_criteria: explicit requirement_refs drive generated NRVV trace.
        evidence_expected: npm test
    validation:
      validation_scenario_id: VAL-1
      scenario: A reviewer checks the PR and can see consistent NRVV trace,
        profile behavior, file-based NRVV intake, and Requirement evidence
        mapping without treating KC as a full ALM tool.
      intended_environment: KC CLI, GitHub Action, templates, and repository
        evidence bundle.
      success_criteria:
        - Need trace status is not contradictory with passed validation evidence.
        - Default NRVV behavior remains backward compatible.
        - Strict NRVV profile can make missing traceability blocking.
        - Issue authors have a clear Requirement and Verification format.
      evidence_expected:
        - reports/validation/VAL-KC-NRVV-FOLLOWUPS-001.md
      validation_status: passed
    gaps:
      verification_to_validation_gap:
        - Unit and CLI tests verify behavior, while real reviewer usefulness
          should continue to be evaluated through future dogfooding.
  acceptance_criteria:
    - Need trace status aligns with validation evidence.
    - NRVV profile optional, warning, and strict behavior is implemented and tested.
    - kc issue-record supports --nrvv-file and rejects invalid NRVV YAML.
    - Issue template and README files include parse-friendly NRVV examples.
    - Plan items and verification evidence can reference Requirements.
    - npm.cmd test passes.
    - KC self-check passes.
  validation_scenario:
    statement: Run tests and KC self-check, then inspect the generated NRVV trace
      and documentation updates.
  risk_tier: medium
  non_goals:
    - Do not make strict NRVV the default.
    - Do not introduce full requirement baseline or versioning.
    - Do not add PLM or ALM integration.
    - Do not publish a new npm release in this PR.
  issue_state: ready_for_plan
