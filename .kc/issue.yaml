issue_packet:
  artifact_role: normalized_snapshot
  issue_ref: https://github.com/sawadari/KC/issues/71
  source:
    type: github_issue
    ref: https://github.com/sawadari/KC/issues/71
    synced_at: 2026-05-12T12:00:00Z
    source_revision: https://github.com/sawadari/KC/issues/71
  problem_statement: GitHub Issues and PRs overlap with .kc artifacts, but KC
    has not clearly explained which records are human collaboration surfaces and
    which artifacts are normalized snapshots for deterministic gating.
  expected_outcome: KC documents the responsibility split, records source
    metadata on Issue snapshots, reports drift between source Issues and
    .kc/issue.yaml, and carries Issue snapshot metadata into generated Evidence
    Bundles.
  nrvv:
    need:
      need_id: NEED-1
      stakeholder: KC users, maintainers, reviewers, and AI coding agents
      situation: A GitHub Issue is the human collaboration record while
        .kc/issue.yaml is the structured gate input, and both may include
        NRVV information.
      pain_or_risk: Users may treat the overlap as accidental duplicate manual
        entry, or may not know what to do when the Issue text and KC snapshot
        drift.
      desired_operational_outcome: Reviewers can distinguish human records from
        machine-readable snapshots and can detect drift before planning or
        review.
    requirements:
      - requirement_id: REQ-1
        statement: Document the responsibility split between GitHub Issues,
          GitHub PRs, .kc artifacts, validation reports, and archives.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-2
        statement: Define .kc/issue.yaml as a normalized snapshot used for KC
          gating, not a replacement for GitHub Issues.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-3
        statement: Add source and snapshot metadata to Issue artifacts.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-4
        statement: Add issue-sync check behavior that reports drift between a
          source Issue candidate and .kc/issue.yaml.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-5
        statement: Explain drift resolution options in user-facing CLI output.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-6
        statement: Include Issue source snapshot metadata in generated Evidence
          Bundles.
        source_need_ref: NEED-1
        risk_tier: medium
    verification:
      - requirement_ref: REQ-1
        method: doc_review
        success_criteria: README files explain GitHub records and .kc snapshots.
        evidence_expected: diff inspection
      - requirement_ref: REQ-2
        method: fixture_check
        success_criteria: issue example marks the artifact as normalized_snapshot.
        evidence_expected: template fixture inspection
      - requirement_ref: REQ-3
        method: unit_test
        success_criteria: source metadata is recorded and preserved.
        evidence_expected: npm test
      - requirement_ref: REQ-4
        method: cli_integration_test
        success_criteria: issue-sync --check reports drift against a local
          Markdown sample.
        evidence_expected: npm test and sample validation
      - requirement_ref: REQ-5
        method: cli_integration_test
        success_criteria: drift output explains re-sync, explicit acceptance,
          or Issue update options.
        evidence_expected: npm test and sample validation
      - requirement_ref: REQ-6
        method: unit_test
        success_criteria: generated Evidence Bundle includes source_snapshots.issue.
        evidence_expected: npm test
    validation:
      validation_scenario_id: VAL-1
      scenario: A user runs KC against a sample workspace and can see why the
        GitHub Issue and .kc/issue.yaml both exist, then can detect drift before
        review.
      intended_environment: KC CLI, README, templates, and generated Evidence Bundle.
      success_criteria:
        - User-facing docs identify GitHub Issue as the human collaboration record.
        - User-facing docs identify .kc/issue.yaml as the normalized gate snapshot.
        - issue-sync --check reports drift with actionable next steps.
        - Generated Evidence Bundle records the Issue snapshot source metadata.
      evidence_expected:
        - reports/validation/VAL-KC-ARTIFACT-RESPONSIBILITY-001.md
      validation_status: passed
    gaps:
      verification_to_validation_gap:
        - Tests prove mechanics, while long-term usefulness depends on future
          user dogfooding across real repositories.
  acceptance_criteria:
    - README.md and README.ja.md explain GitHub records versus .kc snapshots.
    - .kc/issue.example.yaml includes source metadata and artifact_role.
    - Issue artifact parsing and writing preserve source metadata.
    - kc issue-sync --check reports drift against a source Issue candidate.
    - Drift output explains resolution options.
    - Generated Evidence Bundle includes Issue source snapshot metadata.
    - User-oriented sample validation demonstrates the behavior.
  validation_scenario:
    statement: Run tests and a sample workspace showing issue-sync drift
      detection and source snapshot evidence.
  risk_tier: medium
  non_goals:
    - Do not replace GitHub Issues with .kc artifacts.
    - Do not require GitHub API access for normal deterministic kc check.
    - Do not build a full ALM synchronization system.
    - Do not publish npm or move release tags in this PR.
  issue_state: ready_for_plan
