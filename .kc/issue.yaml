issue_packet:
  issue_ref: github:sawadari/KC/issues/13
  problem_statement: "KC accepts agent-written approval YAML as sufficient, so KC's own development flow has no real human judgment point."
  expected_outcome: "Approved plans require explicit human approval evidence, and KC documentation clarifies what humans judge versus what KC checks."
  acceptance_criteria:
    - "Add a deterministic rule that blocks approved plans without human approval evidence."
    - "Update approval templates to include human approval source, actor, and reference."
    - "Document human judgment points in README.md and README.ja.md."
    - "Provide a Codex-friendly numbered approval brief flow so humans can approve, approve with conditions, request changes, or reject without manually composing YAML."
    - "Add tests for missing and present human approval evidence."
    - "Update KC self-governance artifacts without self-approving the work."
  validation_scenario:
    statement: "Codex presents a numbered approval brief, the human replies with a decision number, the decision is mirrored to durable approval evidence, and kc check blocks approved plans without that evidence."
  risk_tier: medium
  non_goals:
    - "Cryptographic identity verification"
    - "Replacing GitHub required reviewers"
    - "Treating AI output as approval"
  issue_state: ready_for_plan
