issue_packet:
  issue_ref: github:sawadari/KC/issues/40
  problem_statement: "The fixed Action runtime is available on main but not yet distributed through npm latest or the v0 GitHub Action tag."
  expected_outcome: "KC v0.5.0 is released so users of npm and sawadari/KC@v0 receive the lifecycle features and Action runtime fix."
  acceptance_criteria:
    - "Bump package metadata to 0.5.0."
    - "Verify tests, pack dry-run, Action bundle metadata, and KC self-check."
    - "Publish @sawadari/kc@0.5.0."
    - "Create v0.5.0 and move v0 to the release commit."
    - "Re-run the sample repository PR and verify both KC@v0 and KC@main jobs pass."
  validation_scenario:
    statement: "Run local release checks, publish 0.5.0, move tags, and validate the sample repository pull request."
  risk_tier: high
  exception_basis: "The release fixes a broken GitHub Action runtime path and is validated against a consumer repository."
  non_goals:
    - "Do not change KC behavior beyond the already merged runtime fix."
    - "Do not create a new product feature in this release PR."
  issue_state: ready_for_plan
