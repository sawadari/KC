issue_packet:
  issue_ref: github:sawadari/KC/issues/38
  problem_statement: "GitHub Actions executes dist/action/index.js as ESM because the repository root package.json has type=module, but the bundled Action contains CommonJS require calls."
  expected_outcome: "KC JavaScript Action runs successfully as a consumer action while preserving npm CLI behavior."
  acceptance_criteria:
    - "Add an Action runtime compatibility fix for dist/action/index.js."
    - "Add CI/test coverage that the Action bundle is treated as CommonJS."
    - "Verify local tests and package dry-run."
    - "Verify the sample repository PR passes with sawadari/KC@main."
  validation_scenario:
    statement: "Run local checks and rerun the sample repository GitHub Actions workflow against sawadari/KC@main."
  risk_tier: high
  exception_basis: "The fix affects Action packaging/runtime only and is validated through a real consumer repository before release."
  non_goals:
    - "Do not change KC rule behavior."
    - "Do not publish npm or move v0 in the implementation PR."
    - "Do not require users to change their workflow YAML."
  issue_state: ready_for_plan
