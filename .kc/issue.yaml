issue_packet:
  issue_ref: github:sawadari/KC/issues/29
  problem_statement: "KC main contains guard hardening that is not yet available through npm latest or the v0 GitHub Action tag."
  expected_outcome: "Publish KC v0.4.0 so npm users and GitHub Action users receive the hardened implementation."
  acceptance_criteria:
    - "Bump package metadata to 0.4.0."
    - "Verify tests, bundle freshness, non-empty Action bundle, and npm pack dry-run."
    - "Open a release PR linked to Issue #29."
    - "After merge, publish @sawadari/kc@0.4.0 with public access."
    - "After merge, move v0 and create v0.4.0 on the release commit."
  validation_scenario:
    statement: "Run npm.cmd test, verify dist/action/index.js is non-empty, rebuild with no dist diff, and run npm.cmd run pack:dry."
  risk_tier: medium
  non_goals:
    - "Do not publish npm from the release preparation branch."
    - "Do not move the v0 tag before the release PR is merged."
    - "Do not change guard behavior in this release preparation PR."
  issue_state: ready_for_plan
