issue_packet:
  issue_ref: github:sawadari/KC/issues/11
  problem_statement: "The README explains KC in internal terms but does not quickly show new users the problem, value, and first successful path."
  expected_outcome: "README.md and README.ja.md make KC understandable and worth trying for new users while staying accurate to current behavior."
  acceptance_criteria:
    - "Lead with the AI-assisted PR review problem and KC value."
    - "Provide a short try-now path using the published npm package."
    - "Explain deterministic decisions and AI-assist boundaries in plain language."
    - "Show GitHub Action setup and expected outputs."
    - "Keep artifact and rule details available after the quick-start flow."
    - "Update both English and Japanese README files."
  validation_scenario:
    statement: "A first-time reader can identify what KC solves, how to run the first command, how to add the Action, and what PASS/WARN/HOLD/FAIL mean."
  risk_tier: low
  non_goals:
    - "Runtime behavior changes"
    - "Package naming or release process changes"
    - "Unsupported marketing claims"
  issue_state: ready_for_plan
