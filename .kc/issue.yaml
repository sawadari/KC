issue_packet:
  issue_ref: https://github.com/sawadari/KC/issues/61
  problem_statement: KC main contains unreleased improvements after v0.5.0,
    including README relationship documentation, NRVV issue discipline, plan
    change request handling, and lifecycle evidence updates.
  expected_outcome: KC v0.6.0 is publicly available through npm and GitHub
    Actions, with finalized KC evidence on main.
  nrvv:
    need:
      need_id: NEED-1
      stakeholder: KC users and maintainers
      situation: The repository has merged post-v0.5.0 changes, but npm latest
        and the major Action tag still point to v0.5.0.
      pain_or_risk: README behavior, templates, CLI behavior, and published
        distribution can drift out of sync if the release is not cut.
      desired_operational_outcome: "@sawadari/kc@0.6.0, v0.6.0, v0, and the
        GitHub Release all point to the same validated release commit."
    requirements:
      - requirement_id: REQ-1
        statement: Bump package metadata from 0.5.0 to 0.6.0.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-2
        statement: Build and verify the GitHub Action bundle for the release commit.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-3
        statement: Run TypeScript, unit, KC PR-mode, KC current-mode, and npm
          pack dry-run checks.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-4
        statement: Publish @sawadari/kc@0.6.0 with public access after merge.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-5
        statement: Create v0.6.0, move v0, and create a GitHub Release after merge.
        source_need_ref: NEED-1
        risk_tier: medium
      - requirement_id: REQ-6
        statement: Finalize KC release evidence after post-merge release tasks complete.
        source_need_ref: NEED-1
        risk_tier: medium
    verification:
      - requirement_ref: REQ-1
        method: diff_inspection
        success_criteria: package.json and package-lock.json show version 0.6.0.
        evidence_expected: diff inspection
      - requirement_ref: REQ-2
        method: build
        success_criteria: npm.cmd run build succeeds and generated Action bundle
          is consistent.
        evidence_expected: build log
      - requirement_ref: REQ-3
        method: test_run
        success_criteria: npm.cmd run check, npm.cmd test, npm.cmd run pack:dry,
          KC PR-mode, and KC current-mode checks pass.
        evidence_expected: validation report
      - requirement_ref: REQ-4
        method: external_check
        success_criteria: npm view @sawadari/kc version returns 0.6.0 after publish.
        evidence_expected: post-merge evidence
      - requirement_ref: REQ-5
        method: external_check
        success_criteria: v0.6.0 and v0 tags resolve to the release commit and
          GitHub Release v0.6.0 exists.
        evidence_expected: post-merge evidence
      - requirement_ref: REQ-6
        method: kc_current_check
        success_criteria: kc finalize creates archive evidence and kc check
          --mode current passes.
        evidence_expected: finalized evidence bundle
    validation:
      validation_scenario_id: VAL-1
      scenario: A fresh consumer can install @sawadari/kc@0.6.0 or use
        sawadari/KC@v0, and the published tool/action corresponds to the
        validated release commit.
      intended_environment: Public GitHub repository sawadari/KC, npm package
        @sawadari/kc, and GitHub Actions Node runtime.
      success_criteria:
        - npm latest resolves to 0.6.0.
        - v0 resolves to the same release commit as v0.6.0.
        - GitHub Release v0.6.0 exists.
        - KC current ledger is finalized and not stale.
      evidence_expected:
        - validation report
        - post-merge evidence
      validation_status: pending
    gaps:
      verification_to_validation_gap:
        - Local tests prove build behavior, while consumer-level validation
          requires post-merge npm, tag, and release resolution.
  acceptance_criteria:
    - package.json and package-lock.json show version 0.6.0.
    - npm.cmd run check passes.
    - npm.cmd test passes.
    - npm.cmd run pack:dry passes.
    - KC PR-mode check passes for the release PR changes.
    - KC current-mode check passes after finalization.
    - npm latest is 0.6.0 after publish.
    - v0.6.0 and v0 tags point to the release commit.
    - GitHub Release v0.6.0 exists.
  validation_scenario:
    statement: A fresh consumer can install @sawadari/kc@0.6.0 or use
      sawadari/KC@v0, and the published tool/action corresponds to the validated
      release commit.
  risk_tier: medium
  non_goals:
    - Do not add new KC feature behavior beyond release metadata and evidence.
    - Do not publish a major v1 Action tag.
    - Do not change package scope or repository ownership.
  issue_state: post_merge_pending
