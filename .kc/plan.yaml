agent_plan:
  plan_id: PLAN-KC-RULESET-001
  issue_ref: github:sawadari/KC/issues/2
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: "Make `.kc/ruleset.yaml` executable by applying configured rule enablement and severity overrides during deterministic KC evaluation."
  scope:
    allowed_files:
      - .kc/**
      - README.md
      - README.ja.md
      - dist/action/index.js
      - reports/validation/**
      - src/core/**
      - src/cli/**
      - templates/.kc/ruleset.yaml
      - tests/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - "Do not add remote ruleset fetching."
    - "Do not add organization-level inheritance."
    - "Do not change the default KC-AE rule definitions."
  plan_items:
    - id: P1
      action: "Resolve ruleset configuration into enabled rule IDs, severity overrides, and configuration findings."
      expected_files:
        - src/core/rules.ts
    - id: P2
      action: "Make CLI checks load `.kc/ruleset.yaml` by default."
      expected_files:
        - src/cli/index.ts
    - id: P3
      action: "Add fixtures and tests for disabled rules, severity overrides, and invalid rule IDs."
      expected_files:
        - tests/core.test.mjs
        - tests/fixtures/ruleset-disabled/**
        - tests/fixtures/ruleset-override/**
        - tests/fixtures/ruleset-invalid/**
    - id: P4
      action: "Document executable ruleset behavior and update templates."
      expected_files:
        - README.md
        - README.ja.md
        - templates/.kc/ruleset.yaml
  verification_plan:
    - "Run npm test."
    - "Run npm audit --audit-level=moderate."
    - "Run npm run pack:dry."
  validation_evidence_plan:
    - "Run ruleset-disabled, ruleset-override, and ruleset-invalid fixtures."
    - "Run KC self-check against the changed-file set and confirm PASS."
  questions_for_human: []
  status: approved

