agent_plan:
  plan_id: PLAN-KC-RELEASE-0.3.0
  issue_ref: github:sawadari/KC/issues/15
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: "Release the already merged human approval flow as KC v0.3.0."
  scope:
    allowed_files:
      - .kc/**
      - package.json
      - package-lock.json
      - dist/action/index.js
      - reports/validation/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - "Do not add new product behavior in this release issue."
    - "Do not commit npm credentials or local token files."
    - "Do not change repository or npm account security settings."
  plan_items:
    - id: P1
      action: "Update package metadata to version 0.3.0."
      expected_files:
        - package.json
        - package-lock.json
      actual_files:
        - package.json
        - package-lock.json
      status: implemented
    - id: P2
      action: "Rebuild the bundled GitHub Action artifact."
      expected_files:
        - dist/action/index.js
      actual_files:
        - dist/action/index.js
      status: implemented
    - id: P3
      action: "Record validation evidence for the release candidate."
      expected_files:
        - reports/validation/**
        - .kc/**
      actual_files:
        - .kc/agent_envelope.yaml
        - .kc/approval.yaml
        - .kc/evidence_bundle.yaml
        - .kc/issue.yaml
        - .kc/plan.yaml
        - reports/validation/VAL-KC-RELEASE-0.3.0.md
      status: implemented
    - id: P4
      action: "Publish and tag the release after PR validation."
      expected_files: []
      actual_files: []
      status: pending
  verification_plan:
    - "Run npm.cmd run check."
    - "Run npm.cmd test."
    - "Run npm.cmd run pack:dry."
    - "Run KC self-check against the release changed files."
  validation_evidence_plan:
    - "Record GitHub issue approval evidence and release validation report."
    - "Verify npm and GitHub release outputs after publication."
  questions_for_human:
    - "Do you approve PLAN-KC-RELEASE-0.3.0 for release implementation and publication?"
  status: approved
