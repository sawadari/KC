agent_plan:
  plan_id: PLAN-KC-NRVV-FOLLOWUPS-001
  issue_ref: github:sawadari/KC/issues/65
  related_issue_refs:
    - github:sawadari/KC/issues/66
    - github:sawadari/KC/issues/67
    - github:sawadari/KC/issues/68
    - github:sawadari/KC/issues/69
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: Implement the NRVV follow-up issues covering trace
    consistency, parser-friendly examples, profile-based enforcement,
    file-based NRVV intake, and explicit Requirement traceability.
  scope:
    allowed_files:
      - .kc/**
      - README.md
      - README.ja.md
      - src/**
      - tests/**
      - templates/**
      - dist/action/index.js
      - reports/validation/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - .vscode/**
      - package.json
      - package-lock.json
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - Do not change package version.
    - Do not publish npm or move GitHub tags.
    - Do not make strict NRVV the default.
    - Do not add PLM or ALM integrations.
  plan_items:
    - id: P1
      requirement_refs:
        - REQ-1
        - REQ-5
      action: Update generated NRVV trace behavior for Need status,
        plan_items[].requirement_refs, and verification_evidence[].requirement_refs.
      expected_files:
        - src/core/check.ts
        - dist/action/index.js
        - tests/**
      actual_files:
        - src/core/check.ts
        - dist/action/index.js
        - tests/core.test.mjs
      status: completed
    - id: P2
      requirement_refs:
        - REQ-3
        - REQ-5
      action: Add NRVV profile policy and strict traceability findings.
      expected_files:
        - src/core/rules.ts
        - templates/.kc/ruleset.yaml
        - .kc/ruleset.yaml
        - tests/**
      actual_files:
        - src/core/rules.ts
        - templates/.kc/ruleset.yaml
        - .kc/ruleset.yaml
        - tests/core.test.mjs
      status: completed
    - id: P3
      requirement_refs:
        - REQ-4
      action: Add issue-record --nrvv-file.
      expected_files:
        - src/cli/index.ts
        - src/core/issue.ts
        - tests/**
      actual_files:
        - src/cli/index.ts
        - src/core/issue.ts
        - tests/core.test.mjs
      status: completed
    - id: P4
      requirement_refs:
        - REQ-2
        - REQ-5
      action: Update README files, templates, and AGENTS guidance.
      expected_files:
        - README.md
        - README.ja.md
        - templates/**
      actual_files:
        - README.md
        - README.ja.md
        - templates/.github/ISSUE_TEMPLATE/kc_issue.md
        - templates/.kc/config.example.yaml
        - templates/.kc/evidence_bundle.example.yaml
        - templates/.kc/plan.example.yaml
        - templates/.kc/ruleset.yaml
        - templates/AGENTS.md
      status: completed
    - id: P5
      requirement_refs:
        - REQ-1
        - REQ-2
        - REQ-3
        - REQ-4
        - REQ-5
      action: Update KC self-governance artifacts and validation report.
      expected_files:
        - .kc/**
        - reports/validation/**
      actual_files:
        - .kc/approval.yaml
        - .kc/current.yaml
        - .kc/evidence_bundle.yaml
        - .kc/issue.yaml
        - .kc/plan.yaml
        - .kc/ruleset.yaml
        - reports/validation/VAL-KC-NRVV-FOLLOWUPS-001.md
      status: completed
  verification_plan:
    - npm.cmd run check
    - npm.cmd test
    - npm.cmd run pack:dry
    - KC PR-mode self-check
    - git diff --check
  validation_evidence_plan:
    - Record reports/validation/VAL-KC-NRVV-FOLLOWUPS-001.md.
    - Use PR CI as independent verification.
  questions_for_human:
    - Do you approve PLAN-KC-NRVV-FOLLOWUPS-001?
  status: approved
