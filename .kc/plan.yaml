agent_plan:
  plan_id: PLAN-KC-README-001
  issue_ref: github:sawadari/KC/issues/11
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: "Rewrite the README content so the project is clearer and more appealing to first-time users."
  scope:
    allowed_files:
      - .kc/**
      - README.md
      - README.ja.md
      - reports/validation/**
    prohibited_files:
      - .env
      - .npmrc
      - package.json
      - package-lock.json
      - src/**
      - lib/**
      - dist/**
      - node_modules/**
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - "Do not change CLI, Action, package, or runtime behavior."
    - "Do not publish a new npm package."
    - "Do not overstate AI approval or enforcement guarantees."
  plan_items:
    - id: P1
      action: "Rewrite README.md around problem, quick start, Action usage, decisions, workflow, and details."
      expected_files:
        - README.md
    - id: P2
      action: "Rewrite README.ja.md with the same user-facing structure in Japanese."
      expected_files:
        - README.ja.md
    - id: P3
      action: "Update KC self-governance artifacts and validation report for Issue #11."
      expected_files:
        - .kc/**
        - reports/validation/**
  verification_plan:
    - "Run npm.cmd run check."
    - "Run npm.cmd test."
    - "Run KC self-check for the changed file set."
  validation_evidence_plan:
    - "Review the README content against the Issue #11 acceptance criteria."
  questions_for_human: []
  status: approved
