agent_plan:
  plan_id: PLAN-KC-ACTION-RUNTIME-001
  issue_ref: github:sawadari/KC/issues/38
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: "Fix the KC GitHub Action runtime failure caused by CommonJS bundle execution under a root ESM package."
  scope:
    allowed_files:
      - .github/**
      - .kc/**
      - dist/action/**
      - package.json
      - package-lock.json
      - reports/validation/**
      - tests/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - .vscode/**
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - "Do not change rule engine behavior."
    - "Do not publish to npm before a release PR."
    - "Do not move GitHub Action tags before a release PR."
  plan_items:
    - id: P1
      action: "Mark dist/action/index.js as CommonJS for GitHub Actions runtime."
      expected_files:
        - dist/action/**
        - package.json
      actual_files:
        - dist/action/package.json
        - package.json
      status: implemented
    - id: P2
      action: "Add CI and test coverage for Action runtime package metadata."
      expected_files:
        - .github/**
        - tests/**
      actual_files:
        - .github/workflows/ci.yml
        - tests/core.test.mjs
      status: implemented
    - id: P3
      action: "Record validation and KC self-governance evidence."
      expected_files:
        - .kc/**
        - reports/validation/**
      actual_files:
        - .kc/approval.yaml
        - .kc/current.yaml
        - .kc/evidence_bundle.yaml
        - .kc/issue.yaml
        - .kc/plan.yaml
        - reports/validation/VAL-KC-ACTION-RUNTIME-001.md
      status: implemented
  verification_plan:
    - "Run npm.cmd run check."
    - "Run npm.cmd test."
    - "Run npm.cmd run pack:dry."
    - "Run npm.cmd run build and verify dist/action/index.js and dist/action/package.json have no diff afterward."
    - "Run KC self-check."
  validation_evidence_plan:
    - "Record reports/validation/VAL-KC-ACTION-RUNTIME-001.md."
    - "Use GitHub Actions CI on the KC PR."
    - "Use sample repository PR checks for sawadari/KC@main."
  questions_for_human:
    - "Do you approve PLAN-KC-ACTION-RUNTIME-001 for implementation?"
  status: approved
