agent_plan:
  plan_id: PLAN-KC-CHANGE-REQUEST-001
  issue_ref: github:sawadari/KC/issues/49
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: Add deterministic Plan Change Request artifact support for scope expansion.
  scope:
    allowed_files:
      - .kc/**
      - src/**
      - tests/**
      - templates/**
      - README.md
      - README.ja.md
      - dist/action/index.js
      - reports/validation/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - .vscode/**
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - Do not add AI approval behavior.
    - Do not publish or tag a new release in this PR.
  plan_items:
    - id: P1
      action: Load and template Plan Change Request artifacts.
      expected_files:
        - src/core/artifacts.ts
        - src/core/types.ts
        - src/core/change-request.ts
        - src/core/lifecycle.ts
        - templates/**
        - tests/**
      actual_files:
        - src/core/artifacts.ts
        - src/core/types.ts
        - src/core/change-request.ts
        - src/core/lifecycle.ts
        - templates/.kc/change_request.example.yaml
        - tests/core.test.mjs
      status: completed
    - id: P2
      action: Add deterministic rule behavior for pending and approved change requests.
      expected_files:
        - src/core/rules.ts
        - .kc/ruleset.yaml
        - templates/.kc/ruleset.yaml
        - tests/**
      actual_files:
        - src/core/rules.ts
        - .kc/ruleset.yaml
        - templates/.kc/ruleset.yaml
        - tests/core.test.mjs
      status: completed
    - id: P3
      action: Add CLI helper and documentation.
      expected_files:
        - src/cli/index.ts
        - README.md
        - README.ja.md
        - templates/AGENTS.md
        - tests/**
      actual_files:
        - src/cli/index.ts
        - README.md
        - README.ja.md
        - templates/AGENTS.md
        - tests/core.test.mjs
      status: completed
    - id: P4
      action: Update KC self-governance artifacts and validation report.
      expected_files:
        - .kc/**
        - dist/action/index.js
        - reports/validation/**
      actual_files:
        - .kc/approval.yaml
        - .kc/current.yaml
        - .kc/evidence_bundle.yaml
        - .kc/issue.yaml
        - .kc/plan.yaml
        - .kc/ruleset.yaml
        - dist/action/index.js
        - reports/validation/VAL-KC-CHANGE-REQUEST-001.md
      status: completed
  verification_plan:
    - Run npm.cmd run check.
    - Run npm.cmd test.
    - Run npm.cmd run pack:dry.
    - Run npm.cmd run build.
    - Run KC self-check.
  validation_evidence_plan:
    - Record reports/validation/VAL-KC-CHANGE-REQUEST-001.md.
    - Use GitHub Actions CI on the implementation PR.
  questions_for_human:
    - Do you approve PLAN-KC-CHANGE-REQUEST-001?
  status: approved
