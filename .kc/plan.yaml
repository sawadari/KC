agent_plan:
  plan_id: PLAN-KC-BOOTSTRAP-001
  issue_ref: github:sawadari/KC/issues/1
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: "Make the KC repository self-governed by adding KC artifacts and validation evidence for the v0.1.0 initial release."
  scope:
    allowed_files:
      - .github/**
      - .gitignore
      - .kc/**
      - LICENSE
      - README.md
      - README.ja.md
      - action.yml
      - dist/action/index.js
      - package-lock.json
      - package.json
      - reports/validation/**
      - src/**
      - templates/**
      - tests/**
      - tsconfig.json
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - "Do not publish to npm without npm authentication."
    - "Do not add Codex Hooks in this step."
    - "Do not change the deterministic rule semantics during this self-evaluation pass."
  plan_items:
    - id: P1
      action: "Record the bootstrap Issue, Plan, Approval, Agent Envelope, Evidence Bundle, and ruleset artifacts."
      expected_files:
        - .kc/issue.yaml
        - .kc/plan.yaml
        - .kc/approval.yaml
        - .kc/agent_envelope.yaml
        - .kc/evidence_bundle.yaml
        - .kc/ruleset.yaml
    - id: P2
      action: "Record durable validation evidence for fixture behavior and self-check behavior."
      expected_files:
        - reports/validation/VAL-KC-BOOTSTRAP-001.md
    - id: P3
      action: "Run verification and validation commands without changing rule semantics."
      expected_files:
        - tests/core.test.mjs
        - tests/fixtures/**
  verification_plan:
    - "Run npm test."
    - "Run npm audit --audit-level=moderate."
    - "Confirm GitHub Actions CI for the initial release succeeded."
  validation_evidence_plan:
    - "Run kc check against PASS, WARN, HOLD, and FAIL fixtures."
    - "Run kc check against the KC repository initial release changed-file set and confirm PASS."
  questions_for_human: []
  status: approved

