agent_plan:
  plan_id: PLAN-KC-RELEASE-0.6.0
  issue_ref: github:sawadari/KC/issues/61
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: Release KC v0.6.0 so npm, GitHub tags, GitHub
    Release, and KC evidence reflect the merged post-v0.5.0 improvements.
  scope:
    allowed_files:
      - .kc/**
      - package.json
      - package-lock.json
      - dist/action/index.js
      - dist/action/package.json
      - reports/validation/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - .vscode/**
      - src/**
      - README.md
      - README.ja.md
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - Do not change runtime source behavior.
    - Do not modify README wording in this release PR.
    - Do not edit Knowledge Convergence repository content.
  plan_items:
    - id: P1
      requirement_refs:
        - REQ-1
      action: Bump release metadata to 0.6.0.
      expected_files:
        - package.json
        - package-lock.json
      actual_files:
        - package.json
        - package-lock.json
      status: completed
    - id: P2
      requirement_refs:
        - REQ-2
        - REQ-3
      action: Run release verification and record validation report.
      expected_files:
        - dist/action/index.js
        - dist/action/package.json
        - reports/validation/**
      actual_files:
        - reports/validation/VAL-KC-RELEASE-0.6.0.md
      status: completed
    - id: P3
      requirement_refs:
        - REQ-6
      action: Update KC self-governance artifacts for the release PR.
      expected_files:
        - .kc/**
      actual_files:
        - .kc/approval.yaml
        - .kc/current.yaml
        - .kc/evidence_bundle.yaml
        - .kc/issue.yaml
        - .kc/plan.yaml
      status: completed
  verification_plan:
    - npm.cmd run check
    - npm.cmd test
    - npm.cmd run pack:dry
    - KC PR-mode release check
    - KC current-mode check after finalization
  validation_evidence_plan:
    - Record reports/validation/VAL-KC-RELEASE-0.6.0.md.
    - Verify npm latest, v0.6.0 tag, v0 tag, and GitHub Release after merge.
  questions_for_human:
    - Do you approve PLAN-KC-RELEASE-0.6.0?
  status: approved
