agent_plan:
  plan_id: PLAN-KC-RELEASE-0.4.0
  issue_ref: github:sawadari/KC/issues/29
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: "Prepare the v0.4.0 release metadata and release evidence for KC hardening distribution."
  scope:
    allowed_files:
      - .kc/**
      - package.json
      - package-lock.json
      - dist/action/index.js
      - reports/validation/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - .vscode/**
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - "Do not publish to npm before the PR is merged."
    - "Do not move v0 before the PR is merged."
    - "Do not alter KC rule behavior."
  plan_items:
    - id: P1
      action: "Bump package metadata for the v0.4.0 release."
      expected_files:
        - package.json
        - package-lock.json
      actual_files:
        - package.json
        - package-lock.json
      status: implemented
    - id: P2
      action: "Verify release package and Action bundle state."
      expected_files:
        - dist/action/index.js
        - reports/validation/**
      actual_files:
        - reports/validation/VAL-KC-RELEASE-0.4.0.md
      status: implemented
    - id: P3
      action: "Update KC self-governance artifacts for the release PR."
      expected_files:
        - .kc/**
      actual_files:
        - .kc/approval.yaml
        - .kc/evidence_bundle.yaml
        - .kc/issue.yaml
        - .kc/plan.yaml
      status: implemented
  verification_plan:
    - "Run npm.cmd test."
    - "Verify dist/action/index.js is non-empty."
    - "Run npm.cmd run build and verify dist/action/index.js has no diff afterward."
    - "Run npm.cmd run pack:dry."
    - "Run KC self-check against the release PR changes."
  validation_evidence_plan:
    - "Record reports/validation/VAL-KC-RELEASE-0.4.0.md."
    - "Use GitHub Actions CI on the release PR as the remote validation gate."
  questions_for_human:
    - "Do you approve PLAN-KC-RELEASE-0.4.0 for release preparation?"
  status: approved
