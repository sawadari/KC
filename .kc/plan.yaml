agent_plan:
  plan_id: PLAN-KC-INIT-NRVV-CANDIDATES-001
  issue_ref: https://github.com/sawadari/KC/issues/73
  related_issue_refs:
    - https://github.com/sawadari/KC/issues/74
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: Strengthen KC onboarding safety for existing
    AGENTS.md users and make NRVV the expected default with draft candidate
    assistance for incomplete Issues.
  scope:
    allowed_files:
      - .kc/**
      - README.md
      - README.ja.md
      - src/cli/index.ts
      - src/core/assist.ts
      - src/core/rules.ts
      - templates/**
      - tests/core.test.mjs
      - dist/action/index.js
      - reports/validation/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - .vscode/**
      - package.json
      - package-lock.json
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - Do not publish npm or move GitHub tags.
    - Do not automatically merge arbitrary user AGENTS.md files.
    - Do not make AI-generated candidates authoritative.
    - Do not require OpenAI API credentials for deterministic checks.
  plan_items:
    - id: P1
      requirement_refs:
        - REQ-1
        - REQ-2
        - REQ-3
      action: Add tests and documentation for AGENTS.md preservation and safe
        KC guidance merging.
      expected_files:
        - README.md
        - README.ja.md
        - templates/**
        - tests/core.test.mjs
      actual_files:
        - README.md
        - README.ja.md
        - templates/AGENTS.md
        - templates/docs/KC_AGENTS_GUIDANCE.md
        - tests/core.test.mjs
      status: completed
    - id: P2
      requirement_refs:
        - REQ-4
        - REQ-5
      action: Add required NRVV profile support and clearer grouped findings.
      expected_files:
        - src/core/rules.ts
        - templates/.kc/ruleset.yaml
        - templates/.kc/config.example.yaml
        - .kc/ruleset.yaml
        - tests/core.test.mjs
      actual_files:
        - src/core/rules.ts
        - templates/.kc/ruleset.yaml
        - templates/.kc/config.example.yaml
        - .kc/ruleset.yaml
        - tests/core.test.mjs
      status: completed
    - id: P3
      requirement_refs:
        - REQ-6
        - REQ-7
      action: Add draft-only NRVV candidate generation with no-API fallback and
        AI assist compatibility.
      expected_files:
        - src/core/assist.ts
        - src/cli/index.ts
        - tests/core.test.mjs
        - dist/action/index.js
      actual_files:
        - src/core/assist.ts
        - src/cli/index.ts
        - tests/core.test.mjs
        - dist/action/index.js
      status: completed
    - id: P4
      requirement_refs:
        - REQ-1
        - REQ-2
        - REQ-3
        - REQ-4
        - REQ-5
        - REQ-6
        - REQ-7
      action: Update KC self-governance artifacts and validation report.
      expected_files:
        - .kc/**
        - reports/validation/**
      actual_files:
        - .kc/approval.yaml
        - .kc/current.yaml
        - .kc/evidence_bundle.yaml
        - .kc/issue.yaml
        - .kc/plan.yaml
        - .kc/ruleset.yaml
        - reports/validation/VAL-KC-INIT-NRVV-CANDIDATES-001.md
      status: completed
  verification_plan:
    - npm.cmd run check
    - npm.cmd test
    - npm.cmd run pack:dry
    - Temporary sample workspace for AGENTS.md preservation and nrvv-candidate
    - KC PR-mode self-check
    - git diff --check
  validation_evidence_plan:
    - Record reports/validation/VAL-KC-INIT-NRVV-CANDIDATES-001.md.
    - Use sample workspace output as user-oriented validation evidence.
  questions_for_human:
    - Do you approve PLAN-KC-INIT-NRVV-CANDIDATES-001?
  status: approved
