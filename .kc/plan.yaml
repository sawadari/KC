agent_plan:
  plan_id: PLAN-KC-RELEASE-0.5.0
  issue_ref: github:sawadari/KC/issues/40
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: "Prepare and validate the KC v0.5.0 release with the Action runtime fix."
  scope:
    allowed_files:
      - .kc/**
      - package.json
      - package-lock.json
      - reports/validation/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - .vscode/**
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - "Do not change source behavior in the release PR."
    - "Do not commit local editor configuration."
  plan_items:
    - id: P1
      action: "Bump package metadata for v0.5.0."
      expected_files:
        - package.json
        - package-lock.json
      actual_files:
        - package.json
        - package-lock.json
      status: implemented
    - id: P2
      action: "Record release validation evidence."
      expected_files:
        - reports/validation/**
      actual_files:
        - reports/validation/VAL-KC-RELEASE-0.5.0.md
      status: implemented
    - id: P3
      action: "Update KC self-governance artifacts for the release PR."
      expected_files:
        - .kc/**
      actual_files:
        - .kc/approval.yaml
        - .kc/current.yaml
        - .kc/evidence_bundle.yaml
        - .kc/issue.yaml
        - .kc/plan.yaml
      status: implemented
  verification_plan:
    - "Run npm.cmd run check."
    - "Run npm.cmd test."
    - "Run npm.cmd run pack:dry."
    - "Run npm.cmd run build and verify dist/action artifacts have no diff."
    - "Run KC self-check."
  validation_evidence_plan:
    - "Record reports/validation/VAL-KC-RELEASE-0.5.0.md."
    - "Use GitHub Actions CI on the release PR."
    - "After release, verify sample repository PR checks for KC@v0 and KC@main."
  questions_for_human:
    - "Do you approve PLAN-KC-RELEASE-0.5.0?"
  status: approved
