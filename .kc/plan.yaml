agent_plan:
  plan_id: PLAN-KC-ARTIFACT-RESPONSIBILITY-001
  issue_ref: https://github.com/sawadari/KC/issues/71
  agent:
    agent_id: codex
    role_class: execution_agent
    owner_role: developer
  interpreted_requirement: Clarify the boundary between human-facing GitHub
    records and machine-readable KC snapshots, then add source metadata and
    drift checking so users can manage intentional overlap.
  scope:
    allowed_files:
      - .kc/**
      - README.md
      - README.ja.md
      - src/core/issue.ts
      - src/core/check.ts
      - src/cli/index.ts
      - tests/core.test.mjs
      - templates/.kc/issue.example.yaml
      - dist/action/index.js
      - reports/validation/**
    prohibited_files:
      - .env
      - .npmrc
      - node_modules/**
      - lib/**
      - coverage/**
      - .vscode/**
      - package.json
      - package-lock.json
      - "**/*secret*"
      - "**/*token*"
  non_goals:
    - Do not publish npm or move GitHub tags.
    - Do not make kc check depend on GitHub API.
    - Do not remove .kc/issue.yaml snapshots.
    - Do not implement a full ALM synchronization system.
  plan_items:
    - id: P1
      requirement_refs:
        - REQ-1
        - REQ-2
      action: Document the responsibility split between GitHub records and KC
        snapshots.
      expected_files:
        - README.md
        - README.ja.md
      actual_files:
        - README.md
        - README.ja.md
      status: completed
    - id: P2
      requirement_refs:
        - REQ-2
        - REQ-3
      action: Add source metadata to issue artifacts and examples.
      expected_files:
        - src/core/issue.ts
        - templates/.kc/issue.example.yaml
        - tests/core.test.mjs
      actual_files:
        - src/core/issue.ts
        - templates/.kc/issue.example.yaml
        - tests/core.test.mjs
      status: completed
    - id: P3
      requirement_refs:
        - REQ-4
        - REQ-5
      action: Add issue-sync --check drift reporting and user-facing resolution
        guidance.
      expected_files:
        - src/core/issue.ts
        - src/cli/index.ts
        - tests/core.test.mjs
      actual_files:
        - src/core/issue.ts
        - src/cli/index.ts
        - tests/core.test.mjs
      status: completed
    - id: P4
      requirement_refs:
        - REQ-6
      action: Include Issue source snapshot metadata in generated Evidence Bundles.
      expected_files:
        - src/core/check.ts
        - tests/core.test.mjs
        - dist/action/index.js
      actual_files:
        - src/core/check.ts
        - tests/core.test.mjs
        - dist/action/index.js
      status: completed
    - id: P5
      requirement_refs:
        - REQ-1
        - REQ-2
        - REQ-3
        - REQ-4
        - REQ-5
        - REQ-6
      action: Update KC self-governance artifacts and validation report.
      expected_files:
        - .kc/**
        - reports/validation/**
      actual_files:
        - .kc/approval.yaml
        - .kc/current.yaml
        - .kc/evidence_bundle.yaml
        - .kc/issue.yaml
        - .kc/plan.yaml
        - reports/validation/VAL-KC-ARTIFACT-RESPONSIBILITY-001.md
      status: completed
  verification_plan:
    - npm.cmd run check
    - npm.cmd test
    - npm.cmd run pack:dry
    - Sample workspace issue-sync --check drift validation
    - KC PR-mode self-check
    - git diff --check
  validation_evidence_plan:
    - Record reports/validation/VAL-KC-ARTIFACT-RESPONSIBILITY-001.md.
    - Use sample workspace output as user-oriented validation evidence.
  questions_for_human:
    - Do you approve PLAN-KC-ARTIFACT-RESPONSIBILITY-001?
  status: approved
