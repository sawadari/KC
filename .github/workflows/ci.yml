name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: test -s dist/action/index.js
      - run: |
          node -e "const pkg = require('./dist/action/package.json'); if (pkg.type !== 'commonjs') process.exit(1);"
      - run: npm run build
      - run: git diff --exit-code dist/action/index.js dist/action/package.json
      - run: npm run pack:dry

  kc-current:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node lib/cli/index.js check --workspace . --mode current
