kc:
  enforcement:
    # strict: require KC PR sections on every PR.
    # opt_in: require KC only when a label, PR body marker, or changed path matches.
    # disabled: skip PR body section enforcement.
    mode: strict
    require_when:
      labels:
        - ai-agent
        - codex
      changed_paths:
        - src/**
        - tests/**
      pr_body_marker: "KC: required"
  nrvv:
    # required: missing/incomplete NRVV emits blocking findings.
    # warning: missing/incomplete NRVV emits warning findings during migration.
    # optional: NRVV absent is ignored; incomplete NRVV warns when present.
    # strict: alias-compatible blocking mode; required is the recommended name.
    mode: required
